name: Demo Screenshots
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: media-servarr-sync:screenshot
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d -p 5000:5000 --name app \
            -e SECRET_KEY=screenshot-run-secret \
            -e PLEX_URL=http://127.0.0.1:32400 \
            -e PLEX_TOKEN=fake-token-for-screenshots \
            -e SECTION_MAPPING='{"/":" 1"}' \
            -e DEMO_MODE=true \
            -e ONBOARD_WIKI_URL=https://example.com/wiki \
            -e ONBOARD_REQUEST_URL=https://example.com/requests \
            media-servarr-sync:screenshot

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app..."
          for i in {1..15}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
            if [ "$CODE" = "200" ] || [ "$CODE" = "207" ]; then
              echo "App is ready (HTTP $CODE)."
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE, retrying..."
            sleep 2
          done
          docker logs app
          exit 1

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Take demo screenshots
        run: |
          python3 - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          BASE = "http://localhost:5000"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  ctx = await browser.new_context(viewport={"width": 1280, "height": 900})
                  page = await ctx.new_page()

                  # Screenshot the login page before logging in
                  await page.goto(f"{BASE}/login")
                  await page.wait_for_load_state("networkidle")
                  await page.screenshot(path="screenshot-login.png", full_page=True)
                  print("Saved screenshot-login.png")

                  # Log in via the demo route (no password needed)
                  await page.goto(f"{BASE}/login/demo")
                  await page.wait_for_load_state("networkidle")

                  # Main sync + now-playing dashboard
                  await page.goto(f"{BASE}/")
                  await page.wait_for_load_state("networkidle")
                  # Wait a moment for the now-playing JS to fetch and render
                  await page.wait_for_timeout(1500)
                  await page.screenshot(path="screenshot-webui.png", full_page=True)
                  print("Saved screenshot-webui.png")

                  # Invites page
                  await page.goto(f"{BASE}/invites")
                  await page.wait_for_load_state("networkidle")
                  await page.screenshot(path="screenshot-invites.png", full_page=True)
                  print("Saved screenshot-invites.png")

                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit screenshots to repo
        run: |
          mkdir -p screenshots
          cp screenshot-login.png    screenshots/login.png
          cp screenshot-webui.png    screenshots/webui.png
          cp screenshot-invites.png  screenshots/invites.png
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git diff --staged --quiet && echo "No changes to screenshots." || \
            git commit -m "chore: update demo screenshots [skip ci]" && \
            git push origin HEAD:${{ github.head_ref || github.ref_name }}

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 30

      - name: Stop container
        if: always()
        run: docker rm -f app
