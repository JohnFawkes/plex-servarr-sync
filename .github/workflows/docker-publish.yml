name: Docker Build & Publish

# This workflow runs when a push is made to the default branch (usually main/master)
# OR when a Pull Request is opened/updated against the default branch.
on:
  push:
    branches: [ "main", "master" ]
    # Only run if these specific files change
    paths:
      - 'media-servarr-sync.py'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'requirements.txt'
      - 'templates/**'

  workflow_dispatch:

  pull_request:
    branches: [ "main", "master" ]
    # Only run if these specific files change
    paths:
      - 'media-servarr-sync.py'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'requirements.txt'
      - 'templates/**'

env:
  # Use docker.io for Docker Hub if you prefer
  REGISTRY: ghcr.io
  # We will set the lowercase IMAGE_NAME dynamically in the steps below

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CHANGED: Required to create tags and releases
      packages: write
      id-token: write
      security-events: write # Required to upload Trivy SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # CHANGED: Required for version calculation history

      # NEW: Bump version and push tag (Only on push to main)
      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'push'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # Default to patch version (v1.0.0 -> v1.0.1)

      # NEW: Create a GitHub Release (Only on push to main)
      - name: Create a GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generate_release_notes: true

      # FIX: Force the image name to lowercase to avoid Docker registry errors
      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: 'v2.1.1'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            # NEW: Add the specific version tag (e.g. v1.0.5) to the docker image
            type=raw,value=${{ steps.tag_version.outputs.new_tag }},enable=${{ github.event_name == 'push' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      # Build and Load into local Docker daemon for testing
      - name: Build Docker image (Load Local)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Run Container for Testing
        run: |
          # Get the first tag generated by the metadata step
          TAGS="${{ steps.meta.outputs.tags }}"
          TEST_TAG=$(echo "$TAGS" | head -n 1)

          echo "Starting container with tag: $TEST_TAG"
          # Run disconnected (-d) mapped to port 5000 with minimal env vars for startup
          docker run -d -p 5000:5000 \
            -e SECRET_KEY=ci-test-secret-key \
            -e PLEX_URL=http://localhost:32400 \
            -e PLEX_TOKEN=ci-test-token \
            -e SECTION_MAPPING='{"/" : "1"}' \
            -e DEMO_MODE=true \
            -e ONBOARD_WIKI_URL=https://example.com/wiki \
            -e ONBOARD_REQUEST_URL=https://example.com/requests \
            --name test-container "$TEST_TAG"

      - name: Wait for container to start (with retry)
        run: |
          echo "Waiting for service to be ready..."
          # Retry loop: Try curl 10 times with 2s delay
          for i in {1..10}; do
            if curl -s -o /dev/null http://localhost:5000; then
              echo "Service is up!"
              exit 0
            fi
            echo "Waiting..."
            sleep 2
          done
          echo "Service failed to start in time."
          docker logs test-container
          exit 1

      - name: Test Homepage Availability
        run: |
          # Check URL. -L follows redirects (root -> /login).
          echo "Testing homepage access..."
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" -L http://localhost:5000)
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq "200" ]; then
            echo "✅ Test Passed: Website is up and accessible."
          else
            echo "❌ Test Failed: Website returned status $HTTP_STATUS"
            echo "--- Container Logs ---"
            docker logs test-container
            exit 1
          fi

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Take demo screenshots
        run: |
          python3 - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          BASE = "http://localhost:5000"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  ctx = await browser.new_context(viewport={"width": 1280, "height": 900})
                  page = await ctx.new_page()

                  await page.goto(f"{BASE}/login")
                  await page.wait_for_load_state("networkidle")
                  await page.screenshot(path="screenshot-login.png", full_page=True)
                  print("Saved screenshot-login.png")

                  await page.goto(f"{BASE}/login/demo")
                  await page.wait_for_load_state("networkidle")

                  await page.goto(f"{BASE}/")
                  await page.wait_for_load_state("networkidle")
                  await page.wait_for_timeout(1500)
                  await page.screenshot(path="screenshot-webui.png", full_page=True)
                  print("Saved screenshot-webui.png")

                  await page.goto(f"{BASE}/invites")
                  await page.wait_for_load_state("networkidle")
                  await page.screenshot(path="screenshot-invites.png", full_page=True)
                  print("Saved screenshot-invites.png")

                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Commit screenshots to repo
        if: github.event_name == 'push'
        run: |
          mkdir -p screenshots
          cp screenshot-login.png   screenshots/login.png
          cp screenshot-webui.png   screenshots/webui.png
          cp screenshot-invites.png screenshots/invites.png
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git diff --staged --quiet && echo "No changes to screenshots." || \
            git commit -m "chore: update demo screenshots [skip ci]" && \
            git push origin HEAD:${{ github.ref_name }}

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 30

      - name: Stop Test Container
        if: always()
        run: docker rm -f test-container

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          skip-setup-trivy: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
